<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.2.2/dist/aframe-physics-system.min.js"></script>

</head>

<body>

<a-scene physics="gravity: -9.8">

<a-sky color="#88c"></a-sky>

<!-- floor -->
<a-plane rotation="-90 0 0"
width="50"
height="50"
color="#7BC8A4"
static-body>
</a-plane>

<!-- falling cubes -->
<a-box position="0 6 -4" color="red" dynamic-body></a-box>
<a-box position="1 8 -4" color="blue" dynamic-body></a-box>
<a-box position="-1 10 -4" color="yellow" dynamic-body></a-box>

<!-- player -->
<a-entity position="0 1.6 0">

<a-camera wasd-controls look-controls></a-camera>

</a-entity>

</a-scene>

</body>
</html>
