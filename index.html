<!DOCTYPE html>
<html>
<head>
<title>My VR Game</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

<a-sky color="#88c"></a-sky>

<a-plane rotation="-90 0 0" width="30" height="30" color="#7BC8A4"></a-plane>

<a-box position="0 1 -3" color="red" dynamic-body></a-box>
<a-box position="1 3 -3" color="blue" dynamic-body></a-box>
<a-box position="-1 5 -3" color="green" dynamic-body></a-box>

<!-- Player -->
<a-entity id="rig" position="0 1.6 0">
    
<a-camera></a-camera>

<a-entity laser-controls="hand: left"></a-entity>
<a-entity laser-controls="hand: right"></a-entity>

</a-entity>

</a-scene>
</body>
</html>
